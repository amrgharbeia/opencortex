version: '3.8'

services:
  org-agent:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: org-agent
    restart: unless-stopped
    ports:
      - "${ORG_AGENT_DAEMON_PORT:-9105}:${ORG_AGENT_DAEMON_PORT:-9105}"
      - "${ORG_AGENT_WEB_PORT:-8080}:${ORG_AGENT_WEB_PORT:-8080}"
    volumes:
      - /memex:/memex
    env_file:
      - .env

networks:
  sandbox-net:
    driver: bridge

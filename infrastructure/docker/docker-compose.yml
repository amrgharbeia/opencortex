services:
  opencortex:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
    container_name: opencortex
    env_file: ../../.env
    volumes:
      - ../../../..:/memex
      - signal-state:/root/.local/share/signal-cli
    ports:
      - "${ORG_AGENT_DAEMON_PORT:-9105}:9105"
    restart: unless-stopped

volumes:
  signal-state:
